<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cửa hàng sách</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.book{
background:white;
width:200px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
text-align:center;
}

.book img{
width:100%;
border-radius:8px;
}

.price{
color:red;
font-weight:bold;
margin:10px 0;
}

button{
background:#e74c3c;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#c0392b;
}

</style>

</head>

<body>

<header>
📚 Cửa Hàng Sách Online
</header>

<div class="container">

<div class="book">
<img src="https://images-na.ssl-images-amazon.com/images/I/81WcnNQ-TBL.jpg">
<h3>Đắc Nhân Tâm</h3>
<p class="price">90.000đ</p>
<button>Mua ngay</button>
</div>

<div class="book">
<img src="https://images-na.ssl-images-amazon.com/images/I/71aFt4+OTOL.jpg">
<h3>Nhà Giả Kim</h3>
<p class="price">75.000đ</p>
<button>Mua ngay</button>
</div>

<div class="book">
<img src="https://images-na.ssl-images-amazon.com/images/I/81-QB7nDh4L.jpg">
<h3>Tuổi Trẻ Đáng Giá Bao Nhiêu</h3>
<p class="price">88.000đ</p>
<button>Mua ngay</button>
</div>

<div class="book">
<img src="https://images-na.ssl-images-amazon.com/images/I/71UwSHSZRnS.jpg">
<h3>Think and Grow Rich</h3>
<p class="price">95.000đ</p>
<button>Mua ngay</button>
</div>

</div>

</body>
</html>
